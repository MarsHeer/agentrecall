[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentrecall-cloud"
version = "0.1.0"
description = "AgentRecall Cloud API — hosted memory for AI agents"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.110",
    "uvicorn>=0.27",
    "asyncpg>=0.29",
    "pydantic>=2.0",
    "python-dotenv>=1.0",
    "stripe>=7.0",
    "PyJWT>=2.8",
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23", "httpx>=0.27"]

[project.scripts]
agentrecall-cloud = "agentrecall_cloud.server:main"
