[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentrecall-sdk"
version = "0.3.1"
description = "Plug-and-play memory for AI agents"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.0",
]

[project.optional-dependencies]
server = ["fastapi>=0.110", "uvicorn>=0.27"]
embeddings = ["sentence-transformers>=2.3"]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23"]

[project.scripts]
agentrecall-sdk = "agentrecall.server:main"

[tool.hatch.build.targets.wheel]
packages = ["agentrecall"]
