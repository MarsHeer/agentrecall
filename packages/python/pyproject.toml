[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentrecall-sdk"
version = "0.1.0"
description = "Plug-and-play memory for AI agents"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.110",
    "uvicorn>=0.27",
    "sentence-transformers>=2.3",
    "httpx>=0.27",
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23"]

[project.scripts]
agentrecall-sdk = "agentrecall.server:main"

[tool.hatch.build.targets.wheel]
packages = ["agentrecall"]
